<!DOCTYPE html>
<html lang="ru" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Для файла формата .png (рекомендуется) -->
    <link rel="icon" href="images/favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="images/favicon.png">

    <title>Alenoks – автор контента для Twitch и YouTube</title>

    <!-- Подключаем Bootstrap для сетки -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Базовые стили темы */
        body {
            background-color: #0f0f0f;
            color: #e0e0e0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            /* Высота во весь экран */
            margin: 0;
        }
         /* --- БАЗОВЫЕ СТИЛИ (для всех устройств) --- */
        #youtube-feed {
            min-height: 298px;
            /* Резерв для 1 ряда видео (ПК) */
            display: flex;
            flex-wrap: wrap;
        }

        /* --- ПК И ПЛАНШЕТЫ (от 992px и выше) --- */
        @media (min-width: 992px) {
            .navbar-nav {
                flex-direction: row;
            }
        }

        /* --- МОБИЛЬНЫЕ И ПЛАНШЕТЫ (до 991px) --- */
        @media (max-width: 991px) {
            .navbar-collapse {
                background: #111;
                /* Тёмный фон для меню */
                border: 1px solid #333;
                border-radius: 12px;
                margin-top: 10px;
                padding: 15px;
            }

            .nav-link {
                margin: 10px 0;
                font-size: 1.1rem;
            }
        }

        /* --- ТОЛЬКО МОБИЛЬНЫЕ (до 767px) --- */
        @media (max-width: 767px) {
            #youtube-feed {
                min-height: 588px;
                /* Резерв для 2 видео в столбик */
            }
        }
        
        .content-wrapper {
            flex: 1 0 auto;
        }

        .nav-logo {
            height: 60px;
            /* Подбери высоту под свою панель */
            width: auto;
            /* Ширина подстроится автоматически (сохранит пропорции) */
            display: block;
            transition: 0.3s;
        }

        .nav-logo:hover {
            filter: drop-shadow(0 0 8px #ffdf00);
            /* Легкое свечение при наведении */
        }

        /* 3. ИСПРАВЛЕНИЕ: чтобы меню на мобильных выстраивалось в столбик, а на ПК в ряд */
        .navbar-nav {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
        }

       

        /* Основная панель */
        .navbar {
            background-color: #000 !important;
            /* Вернул черный вместо тестового красного */
            border-bottom: 2px solid #ffdf00;
            padding: 15px 0;
        }

        .search-trigger {
            cursor: pointer;
            transition: 0.3s;
        }

        .search-trigger:hover svg {
            fill: #ffdf00 !important;
            filter: drop-shadow(0 0 5px rgba(255, 223, 0, 0.5));
        }

        /* ИКОНКА: Самый надежный способ для темной темы */
        .navbar-toggler-icon {
            background-image: url("data:image/svg+xml;charset=utf8,%3Csvg viewBox='0 0 32 32' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath stroke='rgba(255, 255, 255, 1)' stroke-width='2' stroke-linecap='round' stroke-miterlimit='10' d='M4 8h24M4 16h24M4 24h24'/%3E%3C/svg%3E") !important;
        }

        /* 1. Базовое состояние (после загрузки / закрыто) */
        .navbar-toggler {
            border: 1px solid #333 !important;
            box-shadow: none !important;
            outline: none !important;
            transition: 0.3s ease;
        }

        /* 2. Состояние при наведении, НО только если меню ЗАКРЫТО (не активно) */
        .navbar-toggler:hover {
            border-color: #555 !important;
        }

        /* Чуть светлее серого */

        /* 3. Убираем стандартный синий фокус Bootstrap */
        .navbar-toggler:focus {
            box-shadow: none !important;
        }

        /* 4. СОСТОЯНИЕ КОГДА МЕНЮ ОТКРЫТО (и при наведении на открытое тоже) */
        /* Добавляем :hover в связку, чтобы он не перебивал зеленый цвет */
        .navbar-toggler[aria-expanded="true"],
        .navbar-toggler[aria-expanded="true"]:hover {
            border-color: #ffdf00 !important;
            box-shadow: 0 0 12px rgba(255, 223, 0, 0.6) !important;
        }

        /* Ссылки */
        .nav-link {
            color: #fff !important;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.9rem;
            margin-left: 15px;
        }

        .nav-link:hover {
            color: #ffdf00 !important;
        }

        /* --- СЛАЙДЕР НА SCROLL SNAP --- */
        .slider-container {
            max-width: 1270px;
            margin: 30px auto;
            position: relative;
        }

        .scroll-slider {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid #333;
        }

        /* Скрываем скроллбар */
        .scroll-slider::-webkit-scrollbar {
            display: none;
        }

        .scroll-slider {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .scroll-slide {
            flex: 0 0 100%;
            scroll-snap-align: center;
            position: relative;
        }

        .scroll-slide img {
            width: 100%;
            aspect-ratio: 2 / 1;
            object-fit: cover;
            display: block;
        }

        /* Подпись на слайде */
        .slide-caption {
            position: absolute;
            bottom: 60px;
            left: 30px;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px 25px;
            border-left: 5px solid #ffdf00;
            color: #fff;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 0 10px 10px 0;
            pointer-events: none;
        }

        /* Навигационные точки */
        .slider-nav {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: -45px;
            /* Накладываем поверх слайдера */
            position: relative;
            z-index: 5;
            padding-bottom: 35px;
        }

        .slider-nav a {
            width: 12px;
            height: 12px;
            background-color: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            transition: 0.3s;
            border: 1px solid rgba(0, 0, 0, 0.5);
        }

        /* Активная точка */
        .slider-nav a.active {
            background-color: #ffdf00;
            transform: scale(1.4);
            box-shadow: 0 0 8px #ffdf00;
        }

        .slider-nav a {
            width: 12px;
            height: 12px;
            background-color: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            transition: 0.3s;
            border: 1px solid rgba(0, 0, 0, 0.5);
            /* Убираем синюю рамку в некоторых браузерах */
            outline: none;
        }

        .slider-nav a:hover {
            background-color: #ffdf00;
            transform: scale(1.3);
        }

        /* Оставляем только этот класс для подсветки */
        .slider-nav a.active {
            background-color: #ffdf00;
            transform: scale(1.4);
            box-shadow: 0 0 8px #ffdf00;
        }

        /* Цвет иконки бургера в темной теме */
        .navbar-toggler-icon {
            fill: white;
        }

        /* Контентные блоки */
        .section-title {
            border-bottom: 2px solid #333;
            margin-bottom: 25px;
            padding-bottom: 10px;
            color: #ffdf00;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 1.1rem;
        }

        .video-card {
            background: #1a1a1a;
            border: 1px solid #333;
            margin-bottom: 20px;
            border-radius: 10px;
            overflow: hidden;
            padding: 10px;
            min-height: 274px;
            display: flex;
            flex-direction: column;

            /* НАЧАЛЬНОЕ СОСТОЯНИЕ ДЛЯ АНИМАЦИИ ПРИ ЗАГРУЗКЕ */
            opacity: 0;
            transform: translateY(20px);
            /* Соединяем ваши старые транзиции и новые */
            transition:
                transform 0.5s cubic-bezier(0.4, 0, 0.2, 1),
                opacity 0.5s ease-out,
                border-color 0.3s,
                box-shadow 0.3s;
        }

        /* СОСТОЯНИЕ ПОСЛЕ ЗАГРУЗКИ */
        .video-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* ВАШ HOVER (теперь он будет работать поверх видимой карточки) */
        .video-card.visible:hover {
            transform: translateY(-8px);
            border-color: #ffdf00;
            box-shadow: 0 10px 20px rgba(255, 223, 0, 0.2);
        }

        /* Остальные стили (h4, iframe) оставляем без изменений */
        .video-card h4 {
            margin: 10px 0 0;
            font-size: 0.9rem;
            color: #fff;
            line-height: 1.4;
            transition: 0.3s;
        }

        .video-card.visible:hover h4 {
            color: #ffdf00;
        }

        .video-card iframe {
            border-radius: 5px;
            display: block;
        }

        .insta-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .insta-item {
            display: block;
            background: #252525;
            aspect-ratio: 1 / 1;
            border-radius: 6px;
            border: 1px solid transparent;
            /* Добавляем рамку заранее, чтобы не было прыжка */
            transition: all 0.3s ease;
            /* Плавная анимация */
            cursor: pointer;
            overflow: hidden;
            text-decoration: none;
            overflow: hidden;
            /* Обязательно, чтобы зум не выходил за края */
            position: relative;
        }

        .insta-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* Копирует 6px от родителя */
            border-radius: inherit;
            /* Плавный зум */
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);

        }

        /* Эффект при наведении */
        .insta-item:hover img {
            /* Увеличение на 10% */
            transform: scale(1.1);

        }

        /* Копируем поведение YouTube-карточки */
        .insta-item:hover {
            /* Подъем вверх */
            transform: translateY(-8px);
            /* Золотая рамка */
            border-color: #ffdf00;
            /* Золотистое свечение */
            box-shadow: 0 10px 20px rgba(255, 223, 0, 0.2);

        }

        /* Базовый стиль плейсхолдера */
        .insta-item.placeholder {
            background: linear-gradient(90deg, #252525 25%, #333 50%, #252525 75%);
            background-size: 200% 100%;
            animation: skeleton-blink 1.5s infinite;
            cursor: default;
        }

        /* Анимация "бегущего блика" */
        @keyframes skeleton-blink {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        /* Отключаем трансформацию для пустых блоков */
        .insta-item.placeholder:hover {
            transform: none;
            box-shadow: none;
            border-color: transparent;
        }

        /* Создаем собственный стиль для кнопки подписки */
        .btn-outline-success {
            color: #ffdf00 !important;
            /* Яркий основной текст */
            border-color: #ffdf00 !important;
            /* Яркая рамка */
            background-color: transparent !important;
            text-transform: uppercase;
            /* Все заглавные */
            letter-spacing: 1px;
            /* Небольшой отступ между буквами */
            transition: 0.3s all ease !important;
        }

        /* Эффект при наведении */
        .btn-outline-success:hover {
            /* Заливка при наведении */
            background-color: #ffdf00 !important;
            /* Черный текст на желтом фоне */
            color: #000 !important;
            /* Свечение */
            box-shadow: 0 0 20px rgba(0, 188, 140, 0.4) !important;
        }

        footer {
            padding: 30px 0;
            background: #000;
            border-top: 1px solid #222;
            font-size: 0.85rem;
            /* Чтобы футер не сжимался */
            flex-shrink: 0;

        }
    </style>
</head>

                            style="height: 1px; background: linear-gradient(90deg, transparent, #ffdf00, transparent); margin-top: 5px;">
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

</body>

<script>
    const slider = document.querySelector('.scroll-slider');
    const navLinks = document.querySelectorAll('.slider-nav a');
    const slides = document.querySelectorAll('.scroll-slide');
    let autoScroll;

    // 1. Клик по точкам
    navLinks.forEach(link => {
        link.addEventListener('click', function (e) {
            e.preventDefault();
            const targetId = this.getAttribute('href');
            const targetSlide = document.querySelector(targetId);

            slider.scrollTo({
                left: targetSlide.offsetLeft - slider.offsetLeft,
                behavior: 'smooth'
            });
        });
    });

    // 2. Подсветка активной точки
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                navLinks.forEach(link => {
                    link.classList.toggle('active', link.getAttribute('href') === `#${entry.target.id}`);
                });
            }
        });
    }, { root: slider, threshold: 0.6 });

    slides.forEach(slide => observer.observe(slide));

    // 3. Умная автопрокрутка с паузой
    function startAutoScroll() {
        autoScroll = setInterval(() => {
            if (slider.scrollLeft + slider.offsetWidth >= slider.scrollWidth - 5) {
                slider.scrollTo({ left: 0, behavior: 'smooth' });
            } else {
                slider.scrollBy({ left: slider.offsetWidth, behavior: 'smooth' });
            }
        }, 4000);
    }

    function stopAutoScroll() {
        clearInterval(autoScroll);
    }

    // Запускаем при загрузке
    startAutoScroll();

    // Пауза при наведении мыши на контейнер слайдера
    const container = document.querySelector('.slider-container');
    container.addEventListener('mouseenter', stopAutoScroll);
    container.addEventListener('mouseleave', startAutoScroll);
    container.addEventListener('touchstart', stopAutoScroll);
    container.addEventListener('touchend', startAutoScroll);

    // Автофокус в поле поиска при открытии окна
    const searchModal = document.getElementById('searchModal');
    searchModal.addEventListener('shown.bs.modal', () => {
        searchModal.querySelector('input').focus();
    });
</script>

<script>
    const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fwww.youtube.com%2Ffeeds%2Fvideos.xml%3Fchannel_id%3DUCEEOqyw2t3iozjRkAXI07UA`;

    fetch(apiUrl)
        .then(res => res.json())
        .then(data => {
            const container = document.getElementById('youtube-feed');
            if (data.status === 'ok' && data.items) {
                let html = '';
                // Берем 2 последних видео
                data.items.slice(0, 2).forEach(item => {
                    const videoId = item.guid.split(':').pop();
                    const embedUrl = `https://youtube.com/embed/${videoId}`;

                    html += `
                    <div class="col-md-6 mb-1">
                        <div class="video-card">
                            <iframe width="100%" height="200" 
                                src="${embedUrl}" 
                                frameborder="0" allowfullscreen>
                            </iframe>
                            <h4>${item.title}</h4>
                        </div>
                    </div>`;
                });

                container.innerHTML = html;

                // Находим все созданные карточки
                const cards = container.querySelectorAll('.video-card');

                // Исправленная логика анимации
                requestAnimationFrame(() => {
                    requestAnimationFrame(() => {
                        cards.forEach((card, index) => {
                            setTimeout(() => {
                                card.classList.add('visible');
                            }, index * 150);
                        });
                    });
                });
            } // Закрываем if (data.status...)
        }) // Закрываем .then(data => ...)
        .catch(err => console.error('Ошибка:', err.message));
</script>

<script>
    async function loadInstaFeed() {
        const apiUrl = 'https://feeds.behold.so/N0ow7p1N3HEmBvi926bf';
        // Находим все наши заготовленные квадраты
        const items = document.querySelectorAll('#my-insta-feed .insta-item');

        try {
            const response = await fetch(apiUrl);
            const data = await response.json();
            const posts = data.posts;

            posts.slice(0, 6).forEach((post, index) => {
                if (items[index]) {
                    items[index].classList.remove('placeholder');
                    items[index].innerHTML = `
        <img src="${post.sizes.medium.mediaUrl}" 
             alt="Instagram post" 
             style="opacity: 0; transition: opacity 0.5s ease;" 
             onload="this.style.opacity='1'">
    `;
                    items[index].onclick = () => window.open(post.permalink, '_blank');
                }
            });
        } catch (error) {
            console.error('Ошибка:', error);
            // Если ошибка, квадраты так и останутся просто темными блоками
        }
    }

    loadInstaFeed();
</script>
