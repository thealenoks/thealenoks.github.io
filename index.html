<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Твой Игровой Канал</title>
    <!-- Подключаем Bootstrap для слайдера и сетки -->
    <link href="https://jsdelivr.net" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: 'Arial', sans-serif; }
        .navbar { background-color: #000; border-bottom: 2px solid #00bc8c; }
        .nav-link { color: #fff !important; font-weight: bold; text-transform: uppercase; }
        
        /* Слайдер по центру */
        .carousel-item img { height: 400px; object-fit: cover; border-radius: 10px; }
        .carousel { max-width: 900px; margin: 30px auto; box-shadow: 0 0 20px rgba(0,188,140,0.3); }

        /* Сетки контента */
        .section-title { border-bottom: 2px solid #333; margin-bottom: 20px; padding-bottom: 10px; color: #00bc8c; }
        .video-card, .insta-card { background: #1e1e1e; border: 1px solid #333; margin-bottom: 15px; border-radius: 5px; overflow: hidden; }
        .video-placeholder { background: #000; height: 150px; display: flex; align-items: center; justify-content: center; }
        .insta-placeholder { background: #2a2a2a; height: 120px; }
    </style>
</head>
<body>

    <!-- 1. Навигация (Ссылки справа вверху) -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="#"><img src="LOGO_URL" alt="Logo" width="40"></a>
            <div class="collapse navbar-collapse justify-content-end">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="#home">Главная</a></li>
                    <li class="nav-item"><a class="nav-link" href="#specs">Железо</a></li>
                    <li class="nav-item"><a class="nav-link" href="#schedule">Расписание</a></li>
                    <li class="nav-item"><a class="nav-link" href="#links">Ссылки</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- 2. Слайдер (Фото по центру) -->
    <div id="heroSlider" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="images/image_1.jpg" class="d-block w-100" alt="...">
            </div>
            <div class="carousel-item">
                <img src="images/image_1.jpg" class="d-block w-100" alt="...">
            </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#heroSlider" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#heroSlider" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
        </button>
    </div>

    <!-- 3. Основной контент (Сетки) -->
    <div class="container">
        <div class="row">
            <!-- Левая колонка: Последние видео -->
            <div class="col-md-8">
                <h3 class="section-title">Последние видео</h3>
                <div class="row">
                    <div class="col-6">
                        <div class="video-card">
                            <div class="video-placeholder">▶️</div>
                            <div class="p-2 small">Название крутого прохождения #1</div>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="video-card">
                            <div class="video-placeholder">▶️</div>
                            <div class="p-2 small">Обзор нового патча в игре</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Правая колонка: Instagram -->
            <div class="col-md-4">
                <h3 class="section-title">Instagram</h3>
                <div class="row g-2">
                    <div class="col-4"><div class="insta-placeholder"></div></div>
                    <div class="col-4"><div class="insta-placeholder"></div></div>
                    <div class="col-4"><div class="insta-placeholder"></div></div>
                    <div class="col-4"><div class="insta-placeholder"></div></div>
                    <div class="col-4"><div class="insta-placeholder"></div></div>
                    <div class="col-4"><div class="insta-placeholder"></div></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Скрипты Bootstrap -->
    <script src="https://jsdelivr.net"></script>
</body>
</html>
