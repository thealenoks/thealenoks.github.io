            scroll-snap-align: center;

<script>
    const slider = document.querySelector('.scroll-slider');
    const navLinks = document.querySelectorAll('.slider-nav a');
    const slides = document.querySelectorAll('.scroll-slide');
    let autoScroll;

    // 1. Клик по точкам
    navLinks.forEach(link => {
        link.addEventListener('click', function(e) {
            e.preventDefault();
            const targetId = this.getAttribute('href');
            const targetSlide = document.querySelector(targetId);
            
            slider.scrollTo({
                left: targetSlide.offsetLeft - slider.offsetLeft,
                behavior: 'smooth'
            });
        });
    });

    // 2. Подсветка активной точки
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                navLinks.forEach(link => {
                    link.classList.toggle('active', link.getAttribute('href') === `#${entry.target.id}`);
                });
            }
        });
    }, { root: slider, threshold: 0.6 });

    slides.forEach(slide => observer.observe(slide));

    // 3. Умная автопрокрутка с паузой
    function startAutoScroll() {
        autoScroll = setInterval(() => {
            if (slider.scrollLeft + slider.offsetWidth >= slider.scrollWidth - 5) {
                slider.scrollTo({ left: 0, behavior: 'smooth' });
            } else {
                slider.scrollBy({ left: slider.offsetWidth, behavior: 'smooth' });
            }
        }, 4000);
    }

    function stopAutoScroll() {
        clearInterval(autoScroll);
    }

    // Запускаем при загрузке
    startAutoScroll();

    // Пауза при наведении мыши на контейнер слайдера
    const container = document.querySelector('.slider-container');
    container.addEventListener('mouseenter', stopAutoScroll);
    container.addEventListener('mouseleave', startAutoScroll);
	container.addEventListener('touchstart', stopAutoScroll);
    container.addEventListener('touchend', startAutoScroll);

    // Автофокус в поле поиска при открытии окна
    const searchModal = document.getElementById('searchModal');
    searchModal.addEventListener('shown.bs.modal', () => {
    searchModal.querySelector('input').focus();
});

const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fwww.youtube.com%2Ffeeds%2Fvideos.xml%3Fchannel_id%3DUCEEOqyw2t3iozjRkAXI07UA`

    fetch(apiUrl)
    .then(res => res.json())
    .then(data => {
        const container = document.getElementById('youtube-feed');
        if (data.status === 'ok' && data.items) {
            let html = '';
            // Берем 2 последних видео
            data.items.slice(0, 2).forEach(item => {
                const videoId = item.guid.split(':').pop();
                const embedUrl = `https://youtube.com/embed/${videoId}`;
                
                // Каждое видео оборачиваем в col-md-6 (это даст 2 видео в ряд)
                html += `
    <div class="col-md-6 mb-3">
        <div class="video-card">
            <iframe width="100%" height="200" 
                src="${embedUrl}" 
                frameborder="0" allowfullscreen>
            </iframe>
            <h4>${item.title}</h4>
        </div>
    </div>`;
            });
            container.innerHTML = html;
        }
    })
    .catch(err => console.error('Ошибка:', err.message));
</script>
