<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Твой Игровой Канал</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: white; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        h1 { color: #9146ff; } /* Цвет в стиле Twitch */
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; margin: 20px 0; border: 2px solid #333; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .links { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin: 20px 0; }
        .btn { padding: 12px 24px; text-decoration: none; color: white; border-radius: 5px; font-weight: bold; transition: 0.3s; }
        .twitch { background: #9146ff; }
        .youtube { background: #ff0000; }
        .discord { background: #5865f2; }
        .btn:hover { opacity: 0.8; transform: scale(1.05); }
        .specs { background: #1a1a1a; padding: 20px; border-radius: 10px; text-align: left; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Добро пожаловать на мой канал! 🎮</h1>
        <p>Стримы, гайды и просто ламповый геймплей.</p>

        <!-- Ссылки на соцсети -->
        <div class="links">
            <a href="ССЫЛКА_НА_TWITCH" class="btn twitch" target="_blank">Twitch</a>
            <a href="ССЫЛКА_НА_YOUTUBE" class="btn youtube" target="_blank">YouTube</a>
            <a href="ССЫЛКА_НА_DISCORD" class="btn discord" target="_blank">Discord</a>
        </div>

        <!-- Окно со стримом или последним видео -->
        <div class="video-container">
            <!-- Пример для YouTube. Для Twitch используй их Embed код -->
            <iframe src="https://www.youtube.com/channel/UCEEOqyw2t3iozjRkAXI07UA" frameborder="0" allowfullscreen></iframe>
        </div>

        <!-- Мой ПК -->
        <div class="specs">
            <h3>Мой Setup 🛠️</h3>
            <ul>
                <li><strong>CPU:</strong> Intel Core i7-12700K</li>
                <li><strong>GPU:</strong> NVIDIA RTX 3080</li>
                <li><strong>RAM:</strong> 32GB DDR4</li>
                <li><strong>Мышь:</strong> Logitech G Pro Wireless</li>
            </ul>
        </div>
    </div>
</body>
</html>
